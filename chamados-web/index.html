<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brazil Transports — Chamados Financeiros</title>
  <script>
    // Aplica o tema salvo ANTES da primeira pintura (evita o "flash" claro).
    // Sem preferência salva, segue o modo do sistema operacional.
    (function () {
      var tema = localStorage.getItem('chamados.tema');
      if (tema !== 'escuro' && tema !== 'claro') {
        tema = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          ? 'escuro' : 'claro';
      }
      document.documentElement.dataset.tema = tema;
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div id="app">
    <!-- Tela de login -->
    <div id="tela-login" class="tela-login oculto">
      <form id="form-login" class="cartao login-cartao">
        <img class="login-logo" src="logo.png" alt="Brazil Transports" />
        <h1>Chamados Financeiros</h1>
        <p class="mudo">Adiantamento de viagens, compras e pagamento de saldo</p>
        <label>Login
          <input type="text" id="login-usuario" autocomplete="username" required />
        </label>
        <label>Senha
          <input type="password" id="login-senha" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn btn-primario btn-largo">Entrar</button>
        <p id="login-erro" class="erro oculto"></p>
        <button type="button" id="btn-tema-login" class="tema-link">Usar modo escuro</button>
      </form>
    </div>

    <!-- Aplicação: barra lateral (navegação vertical) + conteúdo -->
    <div id="tela-app" class="oculto">
      <div class="app-grade">
        <aside class="lateral">
          <div class="lateral-marca">
            <img class="topo-logo" src="logo-white.png" alt="Brazil Transports" />
            <strong>Chamados Financeiros</strong>
          </div>
          <nav class="topo-nav" id="topo-nav"></nav>
          <div class="lateral-rodape">
            <div class="lateral-usuario">
              <span id="sino" class="sino oculto" title="Notificações"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span id="sino-badge" class="sino-badge oculto"></span></span>
              <span id="usuario-nome" class="mudo"></span>
            </div>
            <div class="lateral-acoes">
              <button id="btn-tema" class="btn btn-tema" title="Alternar modo claro/escuro">🌙</button>
              <button id="btn-sair" class="btn">Sair</button>
            </div>
          </div>
        </aside>
        <main id="conteudo" class="conteudo"></main>
      </div>
    </div>

    <!-- Avisos flutuantes -->
    <div id="toasts" class="toasts"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
