<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brazil Transports — Chamados Financeiros</title>
  <script>
    // Aplica o tema salvo ANTES da primeira pintura (evita o "flash" claro).
    // Sem preferência salva, segue o modo do sistema operacional.
    (function () {
      var tema = localStorage.getItem('chamados.tema');
      if (tema !== 'escuro' && tema !== 'claro') {
        tema = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          ? 'escuro' : 'claro';
      }
      document.documentElement.dataset.tema = tema;
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div id="app">
    <!-- Tela de login -->
    <div id="tela-login" class="tela-login oculto">
      <form id="form-login" class="cartao login-cartao">
        <img class="login-logo" src="logo.png" alt="Brazil Transports" />
        <h1>Chamados Financeiros</h1>
        <p class="mudo">Adiantamento de viagens, compras e pagamento de saldo</p>
        <label>Login
          <input type="text" id="login-usuario" autocomplete="username" required />
        </label>
        <label>Senha
          <input type="password" id="login-senha" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn btn-primario btn-largo">Entrar</button>
        <p id="login-erro" class="erro oculto"></p>
        <button type="button" id="btn-tema-login" class="tema-link">Usar modo escuro</button>
      </form>
    </div>

    <!-- Aplicação: barra lateral fixa (verde-floresta) + conteúdo em papel -->
    <div id="tela-app" class="oculto">
      <button id="btn-menu" class="btn-menu" aria-label="Abrir menu"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div id="menu-fundo" class="menu-fundo" aria-hidden="true"></div>
      <div class="app-grade">
        <aside class="lateral">
          <div class="lateral-marca">
            <img class="topo-logo" src="logo-white.png" alt="Brazil Transports" />
            <strong>Chamados Financeiros</strong>
            <span class="lateral-sub">Logística corporativa</span>
          </div>
          <nav class="topo-nav" id="topo-nav"></nav>
          <div class="lateral-rodape">
            <div class="lateral-usuario">
              <span id="usuario-avatar" class="avatar" aria-hidden="true"></span>
              <span class="lateral-usuario-texto">
                <span id="usuario-nome"></span>
                <span id="usuario-papel"></span>
              </span>
            </div>
            <div class="lateral-acoes">
              <span id="sino" class="sino oculto" title="Notificações" role="button" tabindex="0"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span id="sino-badge" class="sino-badge oculto"></span></span>
              <button id="btn-tema" class="btn-icone" title="Alternar modo claro/escuro">🌙</button>
              <button id="btn-sair" class="btn-icone" title="Sair do sistema"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
            </div>
          </div>
        </aside>
        <main id="conteudo" class="conteudo"></main>
      </div>
    </div>

    <!-- Avisos flutuantes -->
    <div id="toasts" class="toasts"></div>
  </div>
  <script src="app.js"></script>
  <script>
    // Menu lateral vira gaveta (drawer) no celular: o hambúrguer abre,
    // e qualquer navegação ou toque no fundo escurecido fecha.
    (function () {
      var fechar = function () { document.body.classList.remove('menu-aberto'); };
      document.getElementById('btn-menu').addEventListener('click', function () {
        document.body.classList.toggle('menu-aberto');
      });
      document.getElementById('menu-fundo').addEventListener('click', fechar);
      document.getElementById('topo-nav').addEventListener('click', fechar);
      window.addEventListener('hashchange', fechar);
    })();
  </script>
</body>
</html>
